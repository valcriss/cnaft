services:
  postgres:
    image: postgres:16-alpine
    container_name: cnaft-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: cnaft
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cnaft"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres_dev_data:
